# Sample-local config so the cxx_modules sample is self-contained.
# compiletools auto-injects the compiler-specific module flag (gcc:
# -fmodules-ts; clang: nothing extra is needed at -std=c++20) for any
# TU that participates in a module dep edge -- so the user only needs
# to opt into C++20 here.
CXXFLAGS = -std=c++20

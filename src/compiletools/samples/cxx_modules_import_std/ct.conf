# C++26 here is generous: `import std;` requires C++23 minimum, and
# `std::println` is C++23 too, but the user said C++26 is fine and it
# eliminates a class of edge cases on toolchains that gate import-std
# behind C++26. compiletools auto-injects the per-compiler module
# enablement flag (`-fmodules-ts` for gcc; libc++/-Wno-reserved-module-
# identifier for clang) when the build set includes the std module.
CXXFLAGS = -std=c++26

# Control-Flow Integrity axis (clang-only).
# Detects forward-edge CFI violations (indirect calls to wrong target type,
# bad-cast dereferences, etc.). Requires -flto. Heavyweight: typically
# only for security-critical release builds.
# Mutually exclusive with asan, msan, and tsan (only one -fsanitize family at
# a time). Composes freely with ubsan.
append-CFLAGS   = -fsanitize=cfi -fvisibility=hidden -flto
append-CXXFLAGS = -fsanitize=cfi -fvisibility=hidden -flto
append-LDFLAGS  = -fsanitize=cfi -flto

# Toolchain axis: Clang.
# Composes with a language-standard axis (cxx11/cxx14/cxx17/cxx20/cxx23
# for C++, c99/c11/c17/c23 for C), an optimization axis (debug/release),
# and any instrumentation axes (asan/ubsan/coverage/cfi/...).
ID = Clang
CC = clang
CXX = clang++
LD = clang++
append-CFLAGS   = -fPIC -Wall
append-CXXFLAGS = -fPIC -Wall -fdiagnostics-color=auto
append-LDFLAGS  = -fPIC -Wall -Werror -Xlinker --build-id

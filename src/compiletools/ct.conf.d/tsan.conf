# Instrumentation axis: ThreadSanitizer.
# Mutually exclusive with asan, msan, and cfi (only one -fsanitize family at
# a time). Composes freely with ubsan.
append-CFLAGS   = -fsanitize=thread -fno-omit-frame-pointer
append-CXXFLAGS = -fsanitize=thread -fno-omit-frame-pointer
append-LDFLAGS  = -fsanitize=thread

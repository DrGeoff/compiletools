# Opinionated bundle: shipped binary.
#
# - gcc toolchain
# - C++26 standard
# - release optimization + LTO
# - distro-style hardening, PIE, symbols stripped
#
# The bundle a CI release job should build for distribution. Pair with
# `--variant=production,reproducible` once that axis ships, or with a
# project-level wrapper extending production with --ffile-prefix-map.
extends = gcc, cxx26, release, lto, hardened, pie, strip

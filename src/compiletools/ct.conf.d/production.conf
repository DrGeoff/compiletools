# Opinionated bundle: shipped binary.
#
# - gcc toolchain
# - C++26 standard
# - release optimization + LTO
# - distro-style hardening, PIE, symbols stripped
#
# The bundle a CI release job should build for distribution. Workspace-
# relative paths are auto-injected via -ffile-prefix-map=<gitroot>=. so
# DWARF / __FILE__ / .d paths are byte-identical across users and CAS
# artefacts hit cleanly across teammates and CI hosts.
extends = gcc, cxx26, release, lto, hardened, pie, strip

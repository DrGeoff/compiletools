# Opinionated bundle: performance-engineering build.
#
# - gcc toolchain via ccache (LLVM perf is comparable, but gcc's
#   auto-vectorizer is more aggressive on common HPC kernels; ccache
#   keeps the LTO-heavy compile loop bearable)
# - C++26 standard
# - release optimization + LTO
#
# Deliberately NOT `native` — that defeats CAS reuse across teammates
# and CI hosts. Add `--variant=perf,native` for local-only runs where
# every cycle matters and cache poisoning is acceptable.
extends = ccache-gcc, cxx26, release, lto

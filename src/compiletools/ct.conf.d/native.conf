# Native-CPU axis: `-march=native -mtune=native` (HPC, perf engineering).
#
# WARNING: defeats cross-machine CAS reuse. Two hosts with different CPUs
# (e.g. AMD Zen 3 vs Intel Cascade Lake) produce *different* object files
# under the same source, so `cas-objdir/<variant>/<basename>_<hashes>.o`
# does NOT hit between them. Use only for local-only builds, or pin to a
# specific microarchitecture (`-march=x86-64-v3`) for portable feature
# levels that DO share cache.
append-CFLAGS   = -march=native -mtune=native
append-CXXFLAGS = -march=native -mtune=native

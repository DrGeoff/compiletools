# This is the lowest priority config file

# Default variant. Variants are now composed from axis conf files (one per
# concern: toolchain / optimization / instrumentation). The string below is
# canonicalized and resolved against the conf files in src/compiletools/ct.conf.d/
# and any per-project / per-user overrides. The user can also pass
# --variant=gcc,debug,asan (comma/space/dot all work) and the resolver
# synthesizes the composition on the fly, no per-combination conf file needed.
variant = gcc.debug

# Canonical token ordering. Tokens earlier in this list sort first when a
# composite variant string is canonicalized. Tokens not in this list go to
# the end of the resolved variant in user-typed order, so a project can add a
# new axis (e.g. `myproj`) without re-declaring the whole order.
# A project ct.conf may override this list entirely.
variant-canonical-order = blank, gcc, clang, icc, msvc, debug, release, releasewithdebinfo, asan, ubsan, tsan, msan, coverage, lto, pgo

exemarkers = [main(,main (,wxIMPLEMENT_APP,g_main_loop_new]
testmarkers = unit_test.hpp
max_file_read_size = 0

# File locking for multi-user/multi-host concurrent builds
# When enabled, compilation commands are wrapped with ct-lock-helper
# to ensure atomic writes to the object CAS
# Requires: cas-objdir with SGID bit and group write permissions
# file-locking = true

# File locking configuration (for --file-locking mode)
# Tune these values for your specific filesystem and network latency

# Cross-host lock timeout (seconds) - how long to wait before escalating warnings
# lock-cross-host-timeout = 600

# Lock wait warning interval (seconds) - how often to print "waiting for lock" messages
# lock-warn-interval = 60

# Lock creation grace period (seconds) - time to wait before considering a lock
# without PID file as stale. Prevents false positives when PID file is being written.
# Should be generous enough for slow NFS but short enough to detect real failures.
# lock-creation-grace-period = 2

# Lock strategy sleep intervals (seconds) - tune based on your network latency
# NOTE: GPFS uses fcntl locking (kernel-managed, no polling needed).
# NOTE: Leaving sleep-interval-lockdir commented enables auto-detection (recommended):
#         Lustre  → 0.01s (fast parallel filesystem)
#         NFS     → 0.1s  (network latency)
#         Unknown → 0.05s (conservative fallback)
#       To override auto-detection, uncomment and set a numeric value:
# sleep-interval-lockdir = 0.1           # Manual override (not recommended)
# sleep-interval-cifs = 0.2              # For CIFS lock polling
# sleep-interval-flock-fallback = 0.1    # When flock command unavailable
# NOTE: Local filesystems (ext4/xfs/btrfs) use flock (blocking), not polling

# Precompiled header cache directory (PCH CAS, content-addressable)
# Default: <git-root>/cas-pchdir/<variant>/
# Multiple users/projects building the same header with the same compiler
# and flags reuse the same cached .gch file. The hash of the full compile
# command determines the cache subdirectory.
# Requires: SGID bit and group write permissions for cross-user sharing.
# cas-pchdir = /path/to/shared/pchcache

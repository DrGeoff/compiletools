# Linker axis variant: GNU gold with mmap'd output disabled.
#
# Extends `gold` and adds -Wl,--no-mmap-output-file. gold's default
# output write path mmaps the output file and writes through the page
# cache, which is fast on local filesystems (ext4/xfs/tmpfs) but ~25%
# slower on GPFS (mmap'd writes don't coalesce well across GPFS's
# distributed block manager). Other distributed filesystems (Lustre,
# NFS) may see similar effects.
#
# Compose with --variant=...,gold-nommap in place of `gold` when
# linking on a filesystem where mmap'd output is a regression. Do NOT
# use on local filesystems — the streamed write path is slower there.
extends = gold
append-LDFLAGS = -Wl,--no-mmap-output-file

# Opinionated bundle: daily development iteration.
#
# - gcc toolchain via ccache (familiar, fast, with on-disk compile cache)
# - C++26 standard
# - debug symbols, no optimization
# - AddressSanitizer + UndefinedBehaviorSanitizer (catches most C++ bugs early)
# - warnings as errors (forces fixing diagnostics before they pile up)
#
# Composes via inheritance, so any user-level override (e.g. a project
# extending `dev` with `extends = dev` plus extra flags) layers cleanly.
extends = ccache-gcc, cxx26, debug, asan, ubsan, werror

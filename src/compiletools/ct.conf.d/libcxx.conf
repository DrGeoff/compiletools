# Standard library axis: LLVM libc++ instead of GNU libstdc++.
# Typically used with the `clang` toolchain.
#
# Note: compiletools already auto-injects `-stdlib=libc++` (and
# `-Wno-reserved-module-identifier` for the std.cppm precompile) when
# *any* translation unit in the build uses `import std;` under clang —
# see build_backend._compiler_module_flags_for / _system_module_extra_flags
# / _build_imports_std. That auto-injection is gated on C++20 module use
# specifically; this axis pins libc++ for *every* compile and link
# regardless of whether modules are in play, which is what you want when:
#   - you mix legacy non-module TUs with module TUs and need them to use
#     the same standard library (otherwise the legacy TUs would link
#     against libstdc++ and trigger ODR/header divergence)
#   - you want a uniform `libc++` cache key for cas-objdir reuse across
#     module and non-module builds
#   - you're testing clang/libc++ behaviour explicitly on a non-modules
#     codebase
# If you only want libc++ for the std module pieces and libstdc++ for
# everything else, leave this axis off and let the auto-injection do its
# narrower job.
append-CXXFLAGS = -stdlib=libc++
append-LDFLAGS  = -stdlib=libc++

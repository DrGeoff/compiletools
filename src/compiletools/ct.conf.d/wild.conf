# Linker axis: wild (a fast linker for Linux, written in Rust by David
# Lattimore). Supports static / static-PIE / dynamic / shared-object
# output, debug info, the GNU jobserver, and partial linker scripts.
# (Incremental linking is the project's headline goal but is NOT yet
# implemented as of wild 0.9.x.)
#
# Invocation differs by compiler, so compiletools normalises it:
#   * gcc >= 16.1 drives -fuse-ld=wild directly.
#   * clang rejects -fuse-ld=wild unless an ld.wild symlink is on PATH
#     (wild's installer does not create one), so apptools rewrites the
#     token to --ld-path=wild automatically.
# For gcc < 16.1, use the `wild-B` axis instead (universal -B+symlink
# trick). compiletools fails fast with a clear message if wild is
# selected but the binary is missing or the gcc is too old.
#
# Install: cargo install --locked wild-linker  (binary -> ~/.cargo/bin)
# Mutually exclusive with the other linker axes (ld/gold/mold/wild-B).
append-LDFLAGS = -fuse-ld=wild

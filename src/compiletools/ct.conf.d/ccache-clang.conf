# Toolchain axis: Clang wrapped with ccache.
#
# Inherits everything from `clang` (ID, flag layers, LD) and overrides only
# CC/CXX so the compile is routed through ccache. The linker is left bare
# because ccache only caches compile steps. `compiler_kind` and
# `compiler_identity` both recognise the `ccache <compiler>` form and fall
# back to scanning the raw string, so cache keys still bind to the real
# compiler binary.
extends = clang
CC = ccache clang
CXX = ccache clang++

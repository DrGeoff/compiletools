# Hardening axis: distro-standard security mitigations.
# Combines fortify-source, stack protection, stack-clash protection, and
# RELRO+BIND_NOW linker hardening. Composes with `pie` for full PIE
# hardening or `static` for hardened-static builds.
append-CFLAGS   = -D_FORTIFY_SOURCE=2 -fstack-protector-strong -fstack-clash-protection -fcf-protection=full
append-CXXFLAGS = -D_FORTIFY_SOURCE=2 -fstack-protector-strong -fstack-clash-protection -fcf-protection=full
append-LDFLAGS  = -Wl,-z,relro,-z,now,-z,noexecstack

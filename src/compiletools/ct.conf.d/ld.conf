# Linker axis: toolchain default linker.
# Intentionally adds NO -fuse-ld= flag — the toolchain (gcc/clang) picks
# whatever the system has configured (usually bfd on traditional GNU
# systems, ld64 on macOS, lld on some clang installs). The point of this
# axis is to give "default linker" a name in the canonical variant string
# so cas-objdir/gcc.ld.release/ is distinguishable from
# cas-objdir/gcc.mold.release/ even though both might end up calling the
# same linker driver on a system where mold is the default.
#
# To pin GNU bfd specifically use --append-LDFLAGS=-fuse-ld=bfd or write
# a project-level bfd.conf.

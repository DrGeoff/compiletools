# Linker axis: GNU gold (older fast linker, predecessor to mold).
# Compatible with gcc and clang. Faster than bfd ld for medium-sized
# projects; superseded by mold for large C++ codebases.
#
# Note: gold mmaps its output file by default, which is fast on local
# filesystems but ~25% slower on GPFS (mmap'd writes don't coalesce
# well across GPFS's distributed block manager). On GPFS (or other
# distributed filesystems where mmap'd output regresses), compose with
# `gold-nommap` instead, which adds -Wl,--no-mmap-output-file.
append-LDFLAGS = -fuse-ld=gold

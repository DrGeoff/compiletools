# PGO phase 1: instrument the build to write profile data at runtime.
# Build with --variant=...,pgo-gen, exercise the binary on representative
# workload (writes *.gcda for gcc / default.profraw for clang), then
# rebuild with --variant=...,pgo-use to consume the profile.
append-CFLAGS   = -fprofile-generate
append-CXXFLAGS = -fprofile-generate
append-LDFLAGS  = -fprofile-generate

# Opinionated bundle: continuous-integration build.
#
# - gcc toolchain
# - C++26 standard
# - release optimization (catches optimizer-only bugs the dev build misses)
# - distro-style hardening (the binary we'd ship if we shipped this)
# - strict warnings -> errors
#
# Pair with --variant=ci,coverage in a separate CI tier for coverage runs.
extends = gcc, cxx26, release, hardened, werror

# Toolchain axis: GCC.
# Composes with debug/release and any instrumentation axes (asan, coverage, etc.).
# Use --variant=gcc,debug (or gcc.debug, gcc debug — all equivalent).
ID = GNU
CC = gcc
CXX = g++
LD = g++
append-CFLAGS   = -fPIC -Wall
append-CXXFLAGS = -std=c++17 -fPIC -Wall
append-LDFLAGS  = -fPIC -Wall -Werror -Xlinker --build-id

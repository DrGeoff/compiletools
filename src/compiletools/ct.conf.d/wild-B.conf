# Linker axis: wild via the universal -B + symlink trick.
#
# Selects the wild linker on toolchains where -fuse-ld=wild is NOT
# available — i.e. gcc < 16.1 (which can't name an arbitrary linker via
# -fuse-ld=). Like ld.conf this conf emits NO flag of its own: selecting
# the `wild-B` axis makes compiletools (apptools._normalize_wild_linker)
# materialise a directory containing a symlink `ld -> $(command -v wild)`
# and inject `-B<dir>` so gcc/clang's collect2 invokes wild as `ld`.
#
# Prefer the plain `wild` axis when your toolchain supports it (gcc >= 16.1,
# or clang via the auto-applied --ld-path=wild). Use `wild-B` only as the
# old-gcc fallback. Mutually exclusive with the other linker axes.
#
# Known limitation: not supported under the bazel backend (bazel's linker-
# choice detection keys on -fuse-ld= / --ld-path=, not -B); use `wild` there.

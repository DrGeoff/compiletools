# Opinionated bundle: maximum hardening.
#
# - clang toolchain via ccache (CFI is clang-only; ccache amortises the
#   CFI/LTO compile cost across rebuilds)
# - C++26 standard
# - release optimization
# - distro-style hardening + PIE + CFI (forward-edge Control Flow Integrity)
#
# Heavyweight — CFI requires LTO (pulled in by cfi.conf) and incurs ~5-15%
# runtime cost. For binaries where exploit mitigation is the priority.
extends = ccache-clang, cxx26, release, hardened, pie, cfi

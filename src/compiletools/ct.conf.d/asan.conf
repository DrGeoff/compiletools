# Instrumentation axis: AddressSanitizer.
# Use with a toolchain + optimization axis, e.g. --variant=gcc,debug,asan.
# Mutually exclusive with msan, tsan, and cfi (only one -fsanitize family at
# a time). Composes freely with ubsan.
append-CFLAGS   = -fsanitize=address -fno-omit-frame-pointer
append-CXXFLAGS = -fsanitize=address -fno-omit-frame-pointer
append-LDFLAGS  = -fsanitize=address

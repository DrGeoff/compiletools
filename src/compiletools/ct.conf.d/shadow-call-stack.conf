# Shadow Call Stack axis (aarch64 only, clang and gcc >= 12).
# Hardens against return-address overwrites by maintaining a separate
# stack of return addresses in a reserved register.
append-CFLAGS   = -fsanitize=shadow-call-stack
append-CXXFLAGS = -fsanitize=shadow-call-stack
append-LDFLAGS  = -fsanitize=shadow-call-stack

# Instrumentation axis: MemorySanitizer (clang-only).
# Requires clang AND an msan-instrumented libstdc++/libc++ at runtime —
# without one, uninstrumented library code triggers false-positive uninit
# reports. Useful with `--variant=clang,cxx17,debug,msan`.
append-CFLAGS   = -fsanitize=memory -fno-omit-frame-pointer
append-CXXFLAGS = -fsanitize=memory -fno-omit-frame-pointer
append-LDFLAGS  = -fsanitize=memory

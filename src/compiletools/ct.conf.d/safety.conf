# Opinionated bundle: intensive sanitizer-driven debugging.
#
# - clang toolchain (clang's sanitizer libs are the most comprehensive)
# - C++17 standard
# - debug symbols
# - AddressSanitizer + UndefinedBehaviorSanitizer (covers most memory and UB)
#
# When asan flags a heap issue, switch to --variant=clang,cxx17,debug,msan
# for uninit-read coverage, or to --variant=clang,cxx17,debug,tsan for
# data-race coverage (sanitizers are mutually exclusive).
extends = clang, cxx17, debug, asan, ubsan

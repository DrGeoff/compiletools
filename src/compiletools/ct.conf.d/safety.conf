# Opinionated bundle: intensive sanitizer-driven debugging.
#
# - clang toolchain via ccache (clang's sanitizer libs are the most
#   comprehensive; ccache speeds repeated sanitizer iterations)
# - C++26 standard
# - debug symbols
# - AddressSanitizer + UndefinedBehaviorSanitizer (covers most memory and UB)
#
# When asan flags a heap issue, switch to --variant=ccache-clang,cxx26,debug,msan
# for uninit-read coverage, or to --variant=ccache-clang,cxx26,debug,tsan for
# data-race coverage (sanitizers are mutually exclusive).
extends = ccache-clang, cxx26, debug, asan, ubsan

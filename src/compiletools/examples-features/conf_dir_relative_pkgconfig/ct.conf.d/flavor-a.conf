# Project axis: pins the "flavored" pkg-config flavor to A.
#
# ${CONF_DIR} expands at conf-parse time to the absolute directory of
# this conf file. That lets project axis confs ship path-bearing
# directives portably — the resulting PKG_CONFIG_PATH entry is
# absolute and survives any consumer cwd (the ct-cake-spawned PCH
# compile that runs from cas-pchdir/<variant>/<hash>/, etc.).
#
# Without the placeholder, "ct.conf.d/pkgconfig-a" would be a bare
# literal that pkg-config would resolve against its own cwd at
# subprocess time — a dead-letter from any cwd that is not this
# conf file's directory, silently producing wrong-version builds.
prepend-PKG-CONFIG-PATH = ${CONF_DIR}/pkgconfig-a

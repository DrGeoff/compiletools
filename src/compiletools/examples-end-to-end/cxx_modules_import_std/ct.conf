# C++23 is the minimum: `std::println` (used by main.cpp) is a C++23
# library addition. `import std;` itself is also C++23. compiletools
# auto-injects the per-compiler module enablement flag (`-fmodules-ts`
# for gcc; libc++/-Wno-reserved-module-identifier for clang) when the
# build set includes the std module.
CXXFLAGS = -std=c++23

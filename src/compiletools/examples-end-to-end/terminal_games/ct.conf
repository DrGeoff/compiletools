# Config shared by every game in this example. ${CONF_DIR} expands to this
# file's own directory at parse time, so the common/ facade is on the include
# path no matter which subdir ct-cake is invoked from. The compiler-specific
# module flag is auto-injected for any TU on a module dep edge -- the user only
# opts into the language standard and the shared facade location here.
CXXFLAGS = -std=c++26
INCLUDE = ${CONF_DIR}/common
testmarkers = unit_test.hpp

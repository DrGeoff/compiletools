# sudoku_tui -- the //#GIT= external-fetch showcase. The interesting line is
# externals-dir: //#GIT externals default to cloning as SIBLINGS OF THE
# GITROOT (../<name>), which for an example living inside the compiletools
# repo would drop a sudoku/ clone next to the compiletools checkout. Pinning
# the externals dir under /tmp keeps the demo self-cleaning; override with
# --externals-dir / CT_EXTERNALS_DIR, or skip cloning entirely by pointing
# CT_GIT_PATH_SUDOKU at an existing local clone.
CXXFLAGS = -std=c++26
externals-dir = /tmp/ct-sudoku-tui-externals
testmarkers = unit_test.hpp

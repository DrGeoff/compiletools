name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "pypy-3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        # gcc-16 matches the developer toolchain and fixes the gcc-14 C++20
        # modules placement-new bug (std::deque<Cell> copy ctor -> ::operator
        # new attached to the module) that breaks the terminal_games example.
        # gcc-16 isn't in the noble repos (which top out at gcc-14), so pull it
        # from the toolchain PPA; -std=c++26 (default gcc.cxx26.debug variant)
        # also rules out ubuntu-latest's stock gcc-13.
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config gcc-16 g++-16
          # cpp is already a master alternative on Ubuntu 24.04, so it cannot
          # be slaved under gcc -- only g++ is included.
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-16 160 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-16
          sudo update-alternatives --set gcc /usr/bin/gcc-16
          # clang auto-selects the newest installed gcc for its libstdc++, so
          # installing gcc-16 makes clang parse gcc-16's headers -- which the
          # stock clang on ubuntu-latest is too old to do (it fails with
          # "member access into incomplete type __normal_iterator"). Install
          # clang-22 from apt.llvm.org to match the developer toolchain.
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          # clang and clang++ are each their own master alternative on the
          # runner (clang++ can't be slaved under clang), so point both at v22
          # independently.
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-22 220
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-22 220
          sudo update-alternatives --set clang /usr/bin/clang-22
          sudo update-alternatives --set clang++ /usr/bin/clang++-22
          gcc --version
          g++ --version
          clang --version
          clang++ --version

      - name: Install UV
        run: pip install uv

      # Cache uv's global cache (wheels/sources) and pip cache (optional)
      - name: Cache uv/pip caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uvcache-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uvcache-${{ matrix.python-version }}-
            ${{ runner.os }}-uvcache-

      # Cache the project virtual environment created by `uv sync`
      - name: Cache project .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-venv-${{ matrix.python-version }}-
            ${{ runner.os }}-venv-

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        if: matrix.python-version == '3.14'
        run: |
          uv run pytest -n auto --cov --cov-report=term-missing

      - name: Coverage summary
        if: matrix.python-version == '3.14'
        run: |
          echo '## Coverage Report' >> $GITHUB_STEP_SUMMARY
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        if: matrix.python-version != '3.14'
        run: uv run pytest -n auto

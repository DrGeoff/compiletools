name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "pypy-3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        # gcc-14 is needed because the default variant (gcc.cxx26.debug)
        # passes -std=c++26, which gcc 13 (ubuntu-latest's default) rejects.
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 140 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14 \
            --slave /usr/bin/cpp cpp /usr/bin/cpp-14
          sudo update-alternatives --set gcc /usr/bin/gcc-14
          gcc --version
          g++ --version

      - name: Install UV
        run: pip install uv

      # Cache uv's global cache (wheels/sources) and pip cache (optional)
      - name: Cache uv/pip caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uvcache-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uvcache-${{ matrix.python-version }}-
            ${{ runner.os }}-uvcache-

      # Cache the project virtual environment created by `uv sync`
      - name: Cache project .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-venv-${{ matrix.python-version }}-
            ${{ runner.os }}-venv-

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        if: matrix.python-version == '3.14'
        run: |
          uv run pytest -n auto --cov --cov-report=term-missing

      - name: Coverage summary
        if: matrix.python-version == '3.14'
        run: |
          echo '## Coverage Report' >> $GITHUB_STEP_SUMMARY
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        if: matrix.python-version != '3.14'
        run: uv run pytest -n auto

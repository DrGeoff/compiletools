repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: debug-statements
      - id: check-ast

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright
        # Pyright must see the project's deps (stringzilla, configargparse,
        # rich, …) — the hook's isolated env doesn't have them. Pointing
        # pyright at the worktree's mandatory ``.venv/`` (see CLAUDE.md
        # "Worktree-Based Development") is cleaner than enumerating runtime
        # deps via additional_dependencies, and stays in sync with whatever
        # ``uv pip install -e .[dev]`` resolves.
        pass_filenames: false

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
